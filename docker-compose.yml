version: '3.8'

services:
  app:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: maquinaria-app
    restart: always
    ports:
      - "${APP_PORT:-3005}:3000"
    env_file:
      - .env
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7
    container_name: maquinaria-mongo
    restart: always
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db
    command: ["mongod", "--quiet"]

volumes:
  mongo-data:
